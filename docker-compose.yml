version: '3.8'

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    container_name: php-workspace
    ports:
      - "9000:9000"  # PHP 7.4 FPM
      - "9001:9001"  # PHP 8.4/8.3 FPM
    volumes:
      - ./www:/var/www/html
    networks:
      - php-network
    restart: unless-stopped
    command: /usr/local/bin/start-php-fpm.sh

networks:
  php-network:
    driver: bridge

